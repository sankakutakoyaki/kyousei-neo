<body>
    <header class="flex-area pc-style" th:fragment="headerFragment(box, del)">
        <!-- 検索ボックス -->
        <div class="search-box">
            <input th:id="${box}" type="search" placeholder="検索">
            <!-- <img title="検索" src="/icons/search.png" onclick="execFilterDisplay(this)"> -->
            <img title="検索" src="/icons/search.png">
        </div>
        <div class="kebab-btns">
            <!-- 新規作成ボタン -->
            <!-- <div class="img-btn" onclick="execEdit(0, this)"> -->
            <div class="img-btn">
                <img title="作成・登録" src="/icons/add.png">
                <span>新規</span>
            </div>
            <!-- 削除ボタン -->
             <!-- <div class="img-btn" onclick="execDelete(this)"> -->
            <div th:id="${del}" class="img-btn">
                <img title="削除" src="/icons/dust.png">
                <span>削除</span>
            </div>
            <!-- ダウンロードボタン -->
             <!-- <div class="img-btn" onclick="execDownloadCsv(this)"> -->
            <div class="img-btn">
                <img title="ダウンロード" src="/icons/download.png">
                <span>取得</span>
            </div>
            <!-- 更新ボタン -->
            <!-- <div class="img-btn" onclick="execUpdate(this)"> -->
            <div class="img-btn">
                <img title="更新" src="/icons/update.png">
                <span>更新</span>
            </div>
        </div>
    </header>

    <form id="form-01" class="dialog-content" th:fragment="form01Fragment()" data-enterfocus="form-01">
        <div class="flex-area">
            <div class="form-parts">
                <label>名称</label>
                <input tabindex="1" name="name" class="normal-input" type="text" value="" autofocus
                    placeholder="名称" onfocus="this.select();">
            </div>
        </div>
        <div class="flex-area">
            <div class="form-parts">
                <label>かな</label>
                <input tabindex="2" name="name-kana" class="normal-input" type="text" value=""
                    placeholder="めいしょう" onfocus="this.select();">
            </div>
        </div>
        <div class="flex-area">
            <div class="form-parts">
                <label>電話番号</label>
                <input tabindex="3" name="tel-number" class="normal-input" type="text"
                    inputmode="numeric" pattern="\\d{4}-\\d{4}-\\d{4}" value=""
                    placeholder="01-2345-6789" onfocus="this.select();">
            </div>
            <div class="form-parts">
                <label>FAX番号</label>
                <input tabindex="4" name="fax-number" class="normal-input" type="text"
                    inputmode="numeric" pattern="\\d{4}-\\d{4}-\\d{4}" value=""
                    placeholder="01-2345-6789" onfocus="this.select();">
            </div>
        </div>
        <div class="flex-area" data-resolve="postal">
            <!-- <div class="flex-area"> -->
                <div class="form-parts">
                    <label>郵便番号</label>
                    <input tabindex="5" id="company-postal-code" name="postal-code" class="normal-input" type="text" data-resolve-id
                        inputmode="numeric" pattern="\\d{3}-?\\d{4}" value="" placeholder="012-3456"
                        onfocus="this.select();">
                    <!-- <img title="検索" src="/icons/search.png" onclick="getAddress('Enter', 'postal-code', 'full-address')"> -->
                    <img title="検索" src="/icons/search.png">
                </div>
            <!-- </div> -->
            <!-- <div class="flex-area"> -->
                <div class="form-parts">
                    <label>住所</label>
                    <input tabindex="6" id="company-full-address" name="full-address" class="normal-input" data-resolve-name
                        type="text" value="" placeholder="例）大阪府高槻市柱本5丁目7番10号" onfocus="this.select();">
                </div>
            <!-- </div> -->
        </div>
        <div class="flex-area">
            <div class="form-parts">
                <label>メールアドレス</label>
                <input tabindex="7" name="email" class="normal-input" type="email" value=""
                    placeholder="例）example@kyouseibin.com" onfocus="this.select();">
            </div>
        </div>
        <div class="flex-area">
            <div class="form-parts">
                <label>Webアドレス</label>
                <input tabindex="8" name="web-address" class="normal-input" type="url" value=""
                    placeholder="例）example@kyouseibin.com" onfocus="this.select();">
            </div>
            <div class="form-parts" name="priceArea">
                <label>料金表</label>
                <select tabindex="9" name="price" class="normal-select">
                    <option value="0"></option>
                    <option value="1">有</option>
                </select>
            </div>
        </div>
    </form>

    <form id="form-02" class="dialog-content" th:fragment="form02Fragment()" data-enterfocus="form-02">
        <div class="flex-area">
            <div class="form-parts">
                <label>アカウント</label>
                <input tabindex="1" name="account" class="normal-input" type="text" value="" autofocus
                    placeholder="example@kyouseibin.com" onfocus="this.select();">
            </div>
            <div class="form-parts">
                <label>コード</label>
                <input tabindex="2" name="code" class="normal-input" type="text" inputmode="numeric"
                    pattern="\d*" value="" placeholder="000" onfocus="this.select();">
            </div>
        </div>
        <div class="flex-area">
            <div class="form-parts">
                <label>会社名</label>
                <select tabindex="3" name="company" class="normal-select"></select>
            </div>
        </div>
        <div class="flex-area">
            <div class="form-parts">
                <label>氏名</label>
                <div class="flex-area">
                    <input tabindex="5" name="last-name" class="normal-input" type="text" value=""
                        placeholder="姓" onfocus="this.select();">
                    <input tabindex="6" name="first-name" class="normal-input" type="text" value=""
                        placeholder="名" onfocus="this.select();">
                </div>
            </div>
            <div class="form-parts">
                <label>かな</label>
                <div class="flex-area">
                    <input tabindex="7" name="last-name-kana" class="normal-input" type="text" value=""
                        placeholder="せい" onfocus="this.select();">
                    <input tabindex="8" name="first-name-kana" class="normal-input" type="text" value=""
                        placeholder="めい" onfocus="this.select();">
                </div>
            </div>
        </div>
        <div class="flex-area">
            <div class="form-parts">
                <label>携帯番号</label>
                <input tabindex="9" name="phone-number" class="normal-input" type="text"
                    inputmode="numeric" pattern="\\d{3}-\\d{4}-\\d{4}" value=""
                    placeholder="012-3456-7890" onfocus="this.select();">
            </div>
            <div class="form-parts">
                <label>メールアドレス</label>
                <input tabindex="10" name="email" class="normal-input" type="email" value=""
                    placeholder="例）example@kyouseibin.com" onfocus="this.select();">
            </div>
        </div>
        <div class="flex-area" data-resolve="postal">
            <div class="form-parts">
                <label>郵便番号</label>
                <input tabindex="11" id="employee-postal-code" name="postal-code" class="normal-input" data-resolve-id
                    type="text" inputmode="numeric" pattern="\\d{3}-?\\d{4}" value=""
                    placeholder="012-3456" onfocus="this.select();">
                <!-- <img title="検索" src="/icons/search.png" onclick="getAddress('Enter', 'employee-postal-code', 'employee-full-address')"> -->
                <img title="検索" src="/icons/search.png">
            </div>
            <div class="form-parts">
                <label>住所</label>
                <input tabindex="12" id="employee-full-address" name="full-address" class="normal-input" data-resolve-name
                    type="text" value="" placeholder="例）大阪府高槻市柱本5丁目7番10号" onfocus="this.select();">
            </div>
        </div>
        <div class="flex-area">
            <div class="form-parts">
                <label>生年月日</label>
                <input tabindex="13" name="birthday" class="normal-input" type="date" value=""
                    onfocus="this.select();">
            </div>
            <div class="form-parts">
                <label>性別</label>
                <select tabindex="14" name="gender" class="normal-select"></select>
            </div>
            <div class="form-parts">
                <label>血液型</label>
                <select tabindex="15" name="blood-type" class="normal-select"></select>
            </div>
        </div>
        <div class="flex-area">
            <div class="form-parts">
                <label>緊急連絡先</label>
                <div class="flex-area">
                    <input tabindex="16" name="emergency-contact" class="normal-input" type="text"
                        value="" placeholder="例）実家・妻" onfocus="this.select();">
                    <input tabindex="17" name="emergency-contact-number" class="normal-input"
                        type="text" inputmode="numeric" pattern="\\d{2,4}-\\d{2,4}-\\d{3,4}" value=""
                        placeholder="012-3456-7890" onfocus="this.select();">
                </div>
            </div>
            <div class="form-parts">
                <label>雇い入れ日</label>
                <input tabindex="18" name="date-of-hire" class="normal-input" type="date" value=""
                    onfocus="this.select();">
            </div>
        </div>
    </form>

    <main class="table-wrapper" th:fragment="mainPartnerFragment(tableId, headerId)">
        <table class="normal-table">
            <!-- <tbody  th:id="${headerId}">
                <tr name="table-header" class="pc-style">
                    <th name="chk-cell"><input name="all-chk-btn" class="normal-chk" type="checkbox"></th>
                    <th data-field="companyId"><span>ID</span></th>
                    <th data-field="name"><span>名称</span></th>
                    <th data-field="telNumber"><span>電話番号</span></th>
                    <th data-field="email"><span>メールアドレス</span></th>
                </tr>
            </tbody> -->
            <thead th:id="${headerId}" class="pc-style"></thead>
            <tbody th:id="${tableId}" class="scroll-area"></tbody>
        </table>
        <button type="button" class="page-top"></button>
    </main>

    <main class="table-wrapper" th:fragment="mainStaffFragment(tableId, headerId)">
        <table class="normal-table">
            <tbody th:id="${headerId}">
                <tr id="row-0" name="table-header" class="pc-style">
                    <!-- <th name="chk-cell"><input name="all-chk-btn" class="normal-chk" type="checkbox" onclick="clickAllCheckBtn(this)"></th> -->
                    <th name="chk-cell"><input name="all-chk-btn" class="normal-chk" type="checkbox"></th>
                    <th><span>ID<span class="sort-arrow"></span></span></th>
                    <th><span>コード<span class="sort-arrow"></span></span></th>
                    <th><span>担当者名<span class="sort-arrow"></span></span></th>
                    <th><span>電話番号<span class="sort-arrow"></span></span></th>
                    <th><span>会社名<span class="sort-arrow"></span></span></th>
                </tr>
            </tbody>
            <tbody th:id="${tableId}" class="scroll-area"></tbody>
        </table>
        <button type="button" class="page-top"></button>
    </main>

    <header class="flex-area pc-style" th:fragment="headerStaffFragment()">
        <div id="code-area" class="flex-area" data-resolve="company" data-enterfocus="code-area">
            <div class="form-parts">
                <label>ID</label>
                <input id="code01" name="code" class="normal-input" type="text" value="" data-resolve-id tabindex="1">
            </div>
            <div class="form-parts">
                <label>会社名</label>
                <select id="name01" name="company" class="normal-select" data-resolve-name tabindex="2"></select>
            </div>
        </div>
        <div class="kebab-btns">
            <!-- 新規作成ボタン -->
             <!-- <div class="img-btn" onclick="execEdit(0, this)"> -->
            <div class="img-btn">
                <img title="作成・登録" src="/icons/add.png">
                <span>新規</span>
            </div>
            <!-- 削除ボタン -->
            <!-- <div class="img-btn" onclick="execDelete(this)"> -->
            <div class="img-btn">
                <img title="削除" src="/icons/dust.png">
                <span>削除</span>
            </div>
            <!-- ダウンロードボタン -->
            <!-- <div class="img-btn" onclick="execDownloadCsv(this)"> -->
            <div class="img-btn">
                <img title="ダウンロード" src="/icons/download.png">
                <span>取得</span>
            </div>
            <!-- 更新ボタン -->
            <!-- <div class="img-btn" onclick="execUpdate(this)"> -->
            <div class="img-btn">
                <img title="更新" src="/icons/update.png">
                <span>更新</span>
            </div>
        </div>
    </header>
</body>
