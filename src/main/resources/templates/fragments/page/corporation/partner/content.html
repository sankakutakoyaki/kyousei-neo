<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/with-sidebar}">
<body>
    <!-- サイドバー -->
    <div layout:fragment="sidebar-content">
        <div th:replace="~{fragments/common/menu :: registFragment}"></div>
    </div>

    <!-- 本体 -->
    <main layout:fragment="content">
        <div class="tab-area">
            <ul class="tab-menu">
                <li class="tab-menu-item is-active" data-action="tab" data-group="partner-tabs" data-target="tab-01">施工店</li>
                <li class="tab-menu-item" data-action="tab" data-group="partner-tabs" data-target="tab-02">担当者</li>
            </ul>
            <div class="tab-panel is-show" id="tab-01" data-tab-content="partner-tabs">
                <div class="table-area">
                    <!-- ヘッダー -->
                    <div th:replace="~{fragments/page/corporation/partner/header :: header01Fragment()}"></div>
                    <!-- コンテンツ -->
                    <div th:replace="~{fragments/table/body :: normalFragment('table-header-01', 'table-01', 'partnerCompany')}"></div>
                    <!-- フッター -->
                    <div th:replace="~{fragments/table/footer :: datetimeFragment('footer-01')}"></div>
                </div>
            </div>
            <div class="tab-panel" id="tab-02" data-tab-content="partner-tabs">
                <div class="table-area">
                    <!-- ヘッダー -->
                    <div th:replace="~{fragments/page/corporation/partner/header :: header02Fragment()}"></div>
                    <!-- コンテンツ -->
                    <div th:replace="~{fragments/table/body :: normalFragment('table-header-02', 'table-02', 'partnerEmployee')}"></div>
                    <!-- フッター -->
                    <div th:replace="~{fragments/table/footer :: datetimeFragment('footer-02')}"></div>
                </div>
            </div>
        </div>
        <!-- </main> -->
        <div id="form-dialog-area">
            <!-- フォーム画面をここに記入する -->
            <div id="form-01" class="form-dialog none">
                <div class="dialog-main">
                    <!-- ヘッダー -->
                    <div th:replace="~{fragments/dialog/header :: headerFragment('formHeader01', '')}"></div>
                    <!-- コンテンツ -->
                    <form th:replace="~{fragments/page/corporation/partner/form :: form01Fragment()}"></form>
                    <!-- フッター -->
                    <!-- <div th:replace="~{fragments/common/footer :: form-footerFragment('formFooter01')}"></div> -->
                </div>
            </div>
            <div id="form-02" class="form-dialog none">
                <div class="dialog-main">
                    <!-- ヘッダー -->
                    <div th:replace="~{fragments/common/header :: form-headerFragment('formHeader02', '')}"></div>
                    <!-- コンテンツ -->
                    <form th:replace="~{fragments/corporation/partner :: form02Fragment()}"></form>
                    <!-- フッター -->
                    <!-- <div th:replace="~{fragments/common/footer :: form-footerFragment('formFooter02')}"></div> -->
                </div>
            </div>
        </div>
        <div id="msg-dialog-area">
            <div th:replace="~{fragments/common/dialog :: messageFragment}"></div>
        </div>
        <script type="text/JavaScript" th:inline="JavaScript">
            window.APP = {
                security: {
                    csrfToken: /*[[${_csrf.token}]]*/,
                    csrfHeader: /*[[${_csrf.headerName}]]*/
                },
                cache: {
                    companyOrigin: /*[[${companyOrigin}]]*/,
                    employeeOrigin: /*[[${employeeOrigin}]]*/,
                    companyComboList: /*[[${companyComboList}]]*/
                }
            };
        </script>
        <script type="module" th:src="@{/js/pages/corporation/partner/partnerPage.js}"></script>
    </main>

</body>
