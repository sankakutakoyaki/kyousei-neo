
<th:block th:fragment="dialogHeader(btnId, title)">

        <span th:text="${title}"></span>
        <button type="button" class="img-btn" th:id="${btnId}" name="cancel-btn">
            <img src="/icons/close-s.png" alt="閉じる">
        </button>
    </div>
</th:block>
