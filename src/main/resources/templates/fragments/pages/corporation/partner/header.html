<th:block th:fragment="header01Fragment()">
    <div id="header-01" class="flex-area pc-style">
        <th:block th:replace="~{fragments/table/header :: searchBoxFragment('search-box-01')}"></th:block>
        <th:block th:replace="~{fragments/table/header :: kebabBtnsFragment(${
            {
                'add' : 'add-btn-01',
                'form' : 'form-01',
                'delete' : 'delete-btn-01',
                'download' : 'download-btn-01',
                'reload' : 'reload-btn-01'
            }}
        )}"></th:block>
    </div>
</th:block>

<th:block th:fragment="header02Fragment()">
    <div id="header-02" class="flex-area pc-style">
        <div>
            <th:block th:replace="~{fragments/table/header :: searchBoxFragment('search-box-01')}"></th:block>
            <th:block th:replace="~{fragments/table/header :: kebabBtnsFragment(${
                {
                    'add': 'add-btn-02',
                    'form': 'form-02',
                    'delete': 'delete-btn-02',
                    'download': 'download-btn-02',
                    'reload': 'reload-btn-02'
                }}
            )}"></th:block>
        </div>
        <div th:id="code-area" class="flex-area" data-resolve="company" data-enterfocus="code-area">
            <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                {
                    'text':'ID',
                    'id':'code01',
                    'name':'name01',
                    'resolveId':true,
                    'index':1
                }}
            )}"></th:block>
            <th:block th:replace="~{fragments/components/box :: selectBoxFragment(${
                {
                    'text':'会社名', 
                    'id':'code02', 
                    'name':'name02',
                    'action':'filter',
                    'combo': 'companyComboList',
                    'top': '-----',
                    'key':'companyId',
                    'resolveName':true
                }}
            )}"></th:block>
        </div>
    </div>
</th:block>
