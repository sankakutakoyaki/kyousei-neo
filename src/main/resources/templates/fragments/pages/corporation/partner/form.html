<th:block th:fragment="form01Fragment()">
    <form id="form-01" class="dialog-content" data-enterfocus="form-01">
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': '名称', 
                'name': 'name', 
                'index': 1 
            }
        })}"></th:block>
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': 'かな', 
                'name': 'name-kana', 
                'index': 2 
            }
        })}"></th:block>
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': '電話番号', 
                'name': 'tel-number', 
                'type': 'phone', 
                'index': 3 
            }
        })}"></th:block>
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': 'FAX番号', 
                'name': 'fax-number', 
                'type': 'phone', 
                'index': 4 
            }
        })}"></th:block>
        <div data-resolve="postal">
            <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                { 
                    'text': '郵便番号', 
                    'name': 'postal-code', 
                    'resolveId': true, 
                    'type': 'postal', 
                    'index': 5 
                }
            })}"></th:block>
            <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                { 
                    'text': '住所', 
                    'name': 'full-address', 
                    'placeholder': '例）大阪府高槻市柱本5丁目7番10号', 
                    'resolveName': true, 
                    'index': 6 
                }
            })}"></th:block>
        </div>
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': 'メールアドレス', 
                'name': 'email', 
                'type': 'email', 
                'index': 7 
            }
        })}"></th:block>
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': 'WEBアドレス', 
                'name': 'web-address', 
                'type': 'url', 
                'index': 8 
            }
        })}"></th:block>
        <div class="form-parts" name="price-area">
            <label>料金表</label>
            <select tabindex="9" name="price" class="normal-select">
                <option value="0"></option>
                <option value="1">有</option>
            </select>
        </div>
    </form>
</th:block>    

<th:block th:fragment="form02Fragment()">
    <form id="form-02" class="dialog-content" data-enterfocus="form-02">
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': 'アカウント', 
                'name': 'account', 
                'placeholder': 'example@kyouseibin.com',
                'index': 1 
            }
        })}"></th:block>
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': 'コード', 
                'name': 'code', 
                'inputmode': 'numeric',
                'pattern': '\d*',
                'placeholder': '000',
                'index': 2 
            }
        })}"></th:block>
        <th:block th:replace="~{fragments/components/box :: selectBoxFragment(${
            { 
                'text': '会社名', 
                'combo': 'companyComboList',
                'top': '-----',
                'name': 'company', 
                'index': 3 
            }
        })}"></th:block>
        <div class="form-parts">
            <label>氏名</label>
            <div class="flex-area">
                <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                    { 
                        'placeholder': '姓', 
                        'name': 'last-name', 
                        'index': 4 
                    }
                })}"></th:block>
                <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                    { 
                        'placeholder': '名', 
                        'name': 'first-name', 
                        'index': 5 
                    }
                })}"></th:block>
            </div>
        </div>
        <div class="form-parts">
            <label>かな</label>
            <div class="flex-area">
                <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                    { 
                        'placeholder': 'せい', 
                        'name': 'last-name-kana', 
                        'index': 6 
                    }
                })}"></th:block>
                <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                    { 
                        'placeholder': 'めい', 
                        'name': 'first-name-kana', 
                        'index': 7
                    }
                })}"></th:block>
            </div>
        </div>
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': '携帯番号', 
                'name': 'phone-number', 
                'type': 'phone', 
                'index': 8
            }
        })}"></th:block>
        <div data-resolve="postal">
            <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                { 
                    'text': '郵便番号', 
                    'name': 'postal-code', 
                    'resolveId': true, 
                    'type': 'postal', 
                    'index': 9
                }
            })}"></th:block>
            <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                { 
                    'text': '住所', 
                    'name': 'full-address', 
                    'placeholder': '例）大阪府高槻市柱本5丁目7番10号', 
                    'resolveName': true, 
                    'index': 10
                }
            })}"></th:block>
        </div>
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': 'メールアドレス', 
                'name': 'email', 
                'type': 'email', 
                'index': 11
            }
        })}"></th:block>
        <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
            { 
                'text': '生年月日', 
                'name': 'birthday', 
                'type': 'date', 
                'index': 12
            }
        })}"></th:block>
        <th:block th:replace="~{fragments/components/box :: selectBoxFragment(${
            { 
                'text': '性別', 
                'name': 'gender', 
                'index': 13
            }
        })}"></th:block>
        <th:block th:replace="~{fragments/components/box :: selectBoxFragment(${
            { 
                'text': '血液型', 
                'name': 'blood-type', 
                'index': 14
            }
        })}"></th:block>
        <div class="form-parts">
            <label>緊急連絡先</label>
            <div class="flex-area">
                <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                    { 
                        'name': 'emergency-contact', 
                        'placeholder': '例）実家・妻',
                        'index': 15
                    }
                })}"></th:block>
                <th:block th:replace="~{fragments/components/box :: inputBoxFragment(${
                    { 
                        'name': 'emergency-contact-number', 
                        'type': 'phone', 
                        'index': 16
                    }
                })}"></th:block>
            </div>
        </div>
    </form>
</th:block>
