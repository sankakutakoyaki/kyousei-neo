
<th:block th:fragment="inputBoxFragment(data)">
    <div class="form-parts">

        <label th:if="${data['text'] != null}"
               th:for="${data['id']}"
               th:text="${data['text']}"></label>

        <input
            class="normal-input"
            type="text"
            th:attr="
                id=${data['id']},
                name=${data['name']},
                data-action=${data['action'] != null ? data['action'] : 'select-on-focus'},
                data-resolve-id=${data['resolveId'] != null ? '' : null},
                data-resolve-name=${data['resolveName'] != null ? '' : null},
                tabindex=${data['index']}
            ">

    </div>
</th:block>

<th:block th:fragment="selectBoxFragment(data)">
    <div class="form-parts">
        <label th:if="${data['text'] != null}"
               th:for="${data['id']}"
               th:text="${data['text']}"></label>
        <select 
            class="normal-select"
            th:attr="
                id=${data['id']},
                name=${data['name']},
                data-target=${data['target']},
                data-field=${data['field']},
                data-action=${data['action']},
                data-resolve-id=${data['resolveId'] != null ? '' : null},
                data-resolve-name=${data['resolveName'] != null ? '' : null},
                tabindex=${data['index']}
            ">
        </select>
    </div>
</th:block>
