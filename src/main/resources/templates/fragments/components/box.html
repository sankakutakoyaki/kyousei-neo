
<th:block th:fragment="inputBoxFragment(data)">
    <th:block th:with="
        patternVal=${data['pattern'] != null ? data['pattern'] :
            (data['type'] == 'phone' ? '[0-9]{4}-[0-9]{4}-[0-9]{4}' :
            (data['type'] == 'postal' ? '[0-9]{3}-?[0-9]{4}' : null))},

        inputmodeVal=${data['inputmode'] != null ? data['inputmode'] :
            (data['type'] == 'phone' || data['type'] == 'postal' ? 'numeric' : null)}
    ">
        <div class="form-parts">
            <label th:if="${data['text']}"
                   th:for="${data['id']}"
                   th:text="${data['text']}"></label>

            <input
                class="normal-input"
                th:type="${data['type'] != null ? data['type'] : 'text'}"
                th:attr="
                    id=${data['id']},
                    name=${data['name']},
                    placeholder=${data['placeholder']},
                    pattern=${patternVal},
                    inputmode=${inputmodeVal},
                    data-action=${data['action'] != null ? data['action'] : 'select-on-focus'},
                    data-resolve-id=${data['resolveId']},
                    data-resolve-name=${data['resolveName']},
                    tabindex=${data['index']},
                    data-trim=${data['trim'] != null ? 'true' : null},
                    data-number=${data['number'] != null ? 'true' : null},
                    data-skip-if-null=${data['skipIfNull'] != null ? 'true' : null},
                    data-zero-to-null=${data['zeroToNull'] != null ? 'true' : null}
                ">
        </div>
    </th:block>
</th:block>

<th:block th:fragment="selectBoxFragment(data)">
    <div class="form-parts">
        <label th:if="${data['text'] != null}"
               th:for="${data['id']}"
               th:text="${data['text']}"></label>
        <select 
            class="normal-select"
            th:attr="
                id=${data['id']},
                name=${data['name']},
                data-key=${data['key']},
                data-action=${data['action']},
                data-combo=${data['combo']},
                data-top=${data['top']},
                data-resolve-id=${data['resolveId']},
                data-resolve-name=${data['resolveName']},
                data-parent-name=${data['parent']},
                data-link-child=${data['link']},
                data-child-default=${data['linkDefault']},
                tabindex=${data['index']},
                data-trim=${data['trim'] != null ? '' : null},
                data-number=${data['number'] != null ? '' : null},
                data-skip-if-null=${data['skipIfNull'] != null ? '' : null},
                data-zero-to-null=${data['zeroToNull'] != null ? '' : null}
            ">
        </select>
    </div>
</th:block>

<th:block th:fragment="dateRangeFragment(data)">
    <div class="date-range">
        <div class="form-parts">
            <label th:if="${data['fromText']}"
                th:text="${data['fromText']}"></label>
            <!-- FROM -->
            <input
                class="normal-input"
                type="date"
                th:attr="
                    id=${data['fromId']},
                    name=${data['fromName']},
                    data-trim=true
                ">
        </div>
        <div class="form-parts">
            <label></label>
            <span class="range-separator">〜</span>
        </div>        
        <div class="form-parts">
            <label th:if="${data['toText']}"
                th:text="${data['toText']}"></label>
            <!-- TO -->
            <input
                class="normal-input"
                type="date"
                th:attr="
                    id=${data['toId']},
                    name=${data['toName']},
                    data-trim=true
                ">
        </div>
    </div>
</th:block>
