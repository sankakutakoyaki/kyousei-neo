<th:block th:fragment="normalFragment(headerId, tableId, config)">
    <div class="table-wrapper">
        <table class="normal-table" th:attr="data-table=${config}">
            <thead th:id="${headerId}" class="pc-style"></thead>
            <tbody th:id="${tableId}" class="scroll-area"></tbody>
        </table>
        <button type="button" class="page-top"></button>
    </div>  
</th:block>
