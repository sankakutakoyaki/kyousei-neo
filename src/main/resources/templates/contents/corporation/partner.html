<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/with-sidebar}">
<body>
    <!-- サイドバー -->
    <div layout:fragment="sidebar-content">
        <div th:replace="~{fragments/common/menu :: registFragment}"></div>
    </div>

    <!-- 本体 -->
    <main layout:fragment="content">
        <div class="tab-area">
            <ul class="tab-menu">
                <li class="tab-menu-item is-active" data-tab="01">施工店</li>
                <li class="tab-menu-item" data-tab="02">担当者</li>
            </ul>
            <div class="tab-panel is-show" data-panel="01">
                <div class="table-area">
                    <!-- ヘッダー -->
                    <header th:replace="~{fragments/corporation/partner :: headerFragment('search-box-01')}"></header>
                    <!-- コンテンツ -->
                    <main th:replace="~{fragments/corporation/partner :: mainPartnerFragment('table-01', 'table-header-01')}"></main>
                    <!-- フッター -->
                    <footer id="footer-01" class="pc-style" th:insert="~{fragments/common/footer :: tableFooterFragment()}"></footer>
                </div>
            </div>
            <div class="tab-panel" data-panel="02">
                <div class="table-area">
                    <!-- ヘッダー -->
                    <header th:replace="~{fragments/corporation/partner :: headerStaffFragment()}"></header>
                    <!-- コンテンツ -->
                    <main th:replace="~{fragments/corporation/partner :: mainStaffFragment('table-02', 'table-header-02')}"></main>
                    <!-- フッター -->
                    <footer id="footer-02" class="pc-style" th:insert="~{fragments/common/footer :: tableFooterFragment()}"></footer>
                </div>
            </div>
        </div>
        <!-- </main> -->
        <div id="form-dialog-area">
            <!-- フォーム画面をここに記入する -->
            <div id="form-dialog-01" class="form-dialog none">
                <div class="dialog-main">
                    <!-- ヘッダー -->
                    <div th:replace="~{fragments/common/header :: form-headerFragment('form-dialog-01', '')}"></div>
                    <!-- コンテンツ -->
                    <form th:replace="~{fragments/corporation/partner :: form01Fragment()}"></form>
                    <!-- フッター -->
                    <div th:replace="~{fragments/common/footer :: footerFragment('form-dialog-01', 'execSave(this)', '保存')}"></div>
                </div>
            </div>
            <div id="form-dialog-02" class="form-dialog none">
                <div class="dialog-main">
                    <!-- ヘッダー -->
                    <div th:replace="~{fragments/common/header :: form-headerFragment('form-dialog-02', '')}"></div>
                    <!-- コンテンツ -->
                    <form th:replace="~{fragments/corporation/partner :: form02Fragment()}"></form>
                    <!-- フッター -->
                    <div th:replace="~{fragments/common/footer :: footerFragment('form-dialog-02', 'execSave(this)', '保存')}"></div>
                </div>
            </div>
        </div>
        <div id="msg-dialog-area">
            <div th:replace="~{fragments/common/dialog :: messageFragment}"></div>
        </div>
        <script type="text/JavaScript" th:inline="JavaScript">
            window.APP = {
                security: {
                    csrfToken: /*[[${_csrf.token}]]*/,
                    csrfHeader: /*[[${_csrf.headerName}]]*/
                },
                session: {
                    // user: /*[[${user}]]*/,
                    // staff: /*[[${staffEntity}]]*/
                },
                master: {
                    // categoryCodes: /*[[${categoryCodes}]]*/,
                    // genderComboList: /*[[${genderComboList}]]*/,
                    // bloodTypeComboList: /*[[${bloodTypeComboList}]]*/
                },
                page: {
                    // companyEntity: /*[[${companyEntity}]]*/,
                    // formEntity: /*[[${formEntity}]]*/,
                    // origin: [],
                    // originEntity: {}
                },
                cache: {
                    companyOrigin: /*[[${companyOrigin}]]*/,
                    employeeOrigin: /*[[${employeeOrigin}]]*/,
                    companyComboList: /*[[${companyComboList}]]*/
                }
            };
        </script>
        <script type="module" th:src="@{/js/pages/corporation/partner/partnerPage.js}"></script>
    </main>

</body>
